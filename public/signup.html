<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Canteen Spot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #ff6a00;
            --primary-hover: #e65c00;
            --secondary: #2ecc71;
            --secondary-hover: #27ae60;
            --accent: #3498db;
            --bg-light: #ffffff;
            --text-dark: #333333;
            --text-muted: #666666;
            --glass-bg: rgba(255, 255, 255, 0.96);
            --glass-border: rgba(255, 255, 255, 0.5);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('0362ccb5896399f86cb2b86c5a9b2bab.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--glass-bg);
            z-index: -1;
        }

        .container {
            background: var(--bg-light);
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--glass-border);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        h2 {
            margin: 0 0 25px;
            color: var(--primary);
            font-size: 2em;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 10px rgba(255, 106, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: translateY(-2px);
        }

        /* Specific Buttons */
        #sendOtp {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 15px rgba(255, 106, 0, 0.4);
        }

        #sendOtp:hover {
            box-shadow: 0 6px 20px rgba(255, 106, 0, 0.5);
        }

        #versign {
            background: linear-gradient(135deg, var(--accent), #2980b9);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }

        #versign:hover {
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.5);
        }

        .login-text {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }

        .login-text a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Signup</h2>
        <form id="signupForm">
            <input type="text" id="name" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="button" id="sendOtp">Send OTP</button>
            <input type="text" id="otp" class="hidden" placeholder="Enter OTP">
            <button type="button" id="versign" class="hidden">Verify OTP</button>
        </form>

        <div class="login-text">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="signup.js"></script>
</body>

</html>
