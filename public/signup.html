<!DOCTYPE html>
<html>
<head>

<title>Signup - Canteen System</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.hidden{
    display:none;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
    transition:0.3s;
}

#sendOtp{
    background:#ff9800;
    color:white;
}

#versign{
    background:#2196F3;
    color:white;
}

.dashboard-btn{
    background:#4CAF50;
    color:white;
}

button:hover{
    opacity:0.9;
}

.login-text{
    margin-top:20px;
    font-size:14px;
}

.login-text a{
    color:#667eea;
    text-decoration:none;
    font-weight:bold;
}

.login-text a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Signup</h2>

<form id="signupForm">

<input type="text" id="name" placeholder="Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="button" id="sendOtp">Send OTP</button>

<input type="text" id="otp" class="hidden" placeholder="Enter OTP">

<button type="button" id="versign" class="hidden">Verify OTP</button>

</form>

<div class="login-text">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

<script src="signup.js"></script>

</body>
</html>
