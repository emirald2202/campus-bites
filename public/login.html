<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.hidden{
    display: none;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
    transition:0.3s;
}

#loginPassword{
    background:#4CAF50;
    color:white;
}

#sendOtp{
    background:#ff9800;
    color:white;
}

#verifyOtp{
    background:#2196F3;
    color:white;
}

button:hover{
    opacity:0.9;
}

.signup-text{
    margin-top:20px;
    font-size:14px;
}

.signup-text a{
    color:#667eea;
    text-decoration:none;
    font-weight:bold;
}

.signup-text a:hover{
    text-decoration:underline;
}


</style>

</head>

<body>

    

<div class="container">

<h2>Login</h2>

<input type="email" id="email" placeholder="Enter email">


<input type="password" id="password" class="hidden" placeholder="Password">

<button id="loginPassword">Login with Password</button>
<button id="login" class = "hidden">Log in</button>

<br><br>

<button id="sendOtp">Login with OTP</button>

<input type="text" id="otp" class="hidden" placeholder="Enter OTP">

<button id="verifyOtp" class="hidden">Verify OTP</button>

<div class="signup-text">
    Don't have an account? <a href="signup.html">Sign Up</a>
</div>

<script src="login.js"></script>

</div>

</body>
</html>
